# Frontend on hybrid Azure worker only (node name must match: kubectl get nodes).
# Image: https://hub.docker.com/r/rayenemejri42/frontend-application
#
# Azure worker (myvm): if pods stay ContainerCreating and Flannel lacks /run/flannel/subnet.env,
# the node cannot reach the apiserver via ClusterIP (10.96.0.1:443). Apply persistent DNAT on the
# worker to the reachable apiserver proxy (example): iptables -t nat -I OUTPUT 1 -p tcp -d 10.96.0.1
# -m tcp --dport 443 -j DNAT --to-destination <CONTROLLER_VPN_IP>:16443 (same rule in PREROUTING
# if needed). Rollout automation: hybrid_vpn/scripts/install_azure_k8s_apiserver_dnat_on_worker.sh
# + systemd azure-k8s-apiserver-dnat.service; snapshot: sudo iptables-save | sudo tee /etc/iptables/rules.v4
# with iptables-persistent / netfilter-persistent enabled on the worker.
#
# Service type LoadBalancer: requires cloud-controller-manager (e.g. OpenStack Octavia) or MetalLB.
# Ingress path (recommended): apply frontend-application-ingress.yaml + TLS secret frontend-tls.
# NodePort-only fallback without Ingress: frontend-application-azure-nodeport.yaml
#
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hybrid-public-urls
  namespace: default
  labels:
    app: frontend-application
data:
  # Primary lab URL: HTTPS via ingress-nginx NodePort 31956 (self-signed OK with curl -k until Let's Encrypt).
  APP_ORIGIN: "https://foodnexus-app.example.com:31956/"
  # Keycloak: HTTPS ingress NodePort 31956, path prefix /auth → foodnexus-keycloak (see foodnexus-infra).
  KEYCLOAK_ISSUER_ORIGIN: "https://foodnexus-app.example.com:31956/auth/realms/foodnexus"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-application
  namespace: default
  labels:
    app: frontend-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-application
  template:
    metadata:
      labels:
        app: frontend-application
    spec:
      nodeSelector:
        kubernetes.io/hostname: myvm
      containers:
        - name: frontend
          image: rayenemejri42/frontend-application:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: hybrid-public-urls
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-application
  namespace: default
  labels:
    app: frontend-application
spec:
  type: ClusterIP
  selector:
    app: frontend-application
  ports:
    - name: http
      port: 80
      targetPort: http
