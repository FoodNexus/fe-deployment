<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">
            <i class="bi bi-recycle me-2"></i>
            Compléter les informations de recyclage
          </h5>
        </div>

        <div class="card-body">

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">

            <div class="mb-3">
              <label class="form-label fw-bold">Poids (kg) *</label>
              <input type="number"
                     formControlName="weight"
                     class="form-control"
                     placeholder="Ex: 15.5"
                     step="0.1"/>
              <div *ngIf="form.get('weight')?.invalid &&
                          form.get('weight')?.touched"
                   class="text-danger small">
                Poids obligatoire et supérieur à 0
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Destination *</label>
              <select formControlName="destination" class="form-select">
                <option value="">-- Choisir --</option>
                <option *ngFor="let d of destinations" [value]="d">
                  {{ d }}
                </option>
              </select>
              <div *ngIf="form.get('destination')?.invalid &&
                          form.get('destination')?.touched"
                   class="text-danger small">
                Destination obligatoire
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
              <button type="button"
                      (click)="cancel()"
                      class="btn btn-outline-secondary">
                Annuler
              </button>
              <button type="submit"
                      [disabled]="form.invalid || loading"
                      class="btn btn-success">
                <span *ngIf="loading"
                      class="spinner-border spinner-border-sm me-1">
                </span>
                Enregistrer
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
