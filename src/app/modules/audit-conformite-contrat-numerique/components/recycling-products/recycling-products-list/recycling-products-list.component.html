<div class="container mt-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>
      <i class="bi bi-recycle me-2"></i>
      Produits à Recycler
    </h2>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-success"></div>
  </div>

  <div *ngIf="!loading" class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>#ID</th>
            <th>Date transfert</th>
            <th>Poids (kg)</th>
            <th>Destination</th>
            <th>Dossier Inspection</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of products">
            <td>{{ product.logId }}</td>
            <td>{{ product.transferDate }}</td>
            <td>
              <span *ngIf="product.weight; else noWeight">
                {{ product.weight }} kg
              </span>
              <ng-template #noWeight>
                <span class="text-muted fst-italic">Non renseigné</span>
              </ng-template>
            </td>
            <td>
              <span *ngIf="product.destination; else noDest"
                    [class]="getDestinationClass(product.destination!)">
                {{ product.destination }}
              </span>
              <ng-template #noDest>
                <span class="text-muted fst-italic">Non renseigné</span>
              </ng-template>
            </td>
            <td>{{ product.inspectionCase?.caseId }}</td>
            <td>
              <a [routerLink]="['/audit/recycling-products/edit', product.logId]"
                 class="btn btn-sm btn-outline-primary me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <button (click)="delete(product.logId!)"
                      class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="products.length === 0">
            <td colspan="6" class="text-center text-muted py-4">
              Aucun produit trouvé
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
