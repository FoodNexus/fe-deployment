<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">
            <i class="bi bi-clipboard2-plus me-2"></i>
            {{ isEdit ? 'Modifier' : 'Nouveau' }} Dossier d'Inspection
          </h5>
        </div>

        <div class="card-body">

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()">

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label fw-bold">Description *</label>
              <textarea formControlName="description"
                        class="form-control"
                        rows="3"
                        placeholder="Décrivez l'anomalie...">
              </textarea>
              <div *ngIf="form.get('description')?.invalid &&
                          form.get('description')?.touched"
                   class="text-danger small">
                Description obligatoire
              </div>
            </div>

            <!-- Verdict Sanitaire -->
            <div class="mb-3">
              <label class="form-label fw-bold">Verdict Sanitaire *</label>
              <select formControlName="sanitaryVerdict" class="form-select">
                <option value="">-- Choisir --</option>
                <option *ngFor="let v of sanitaryVerdicts" [value]="v">
                  {{ v }}
                </option>
              </select>
              <div *ngIf="form.get('sanitaryVerdict')?.invalid &&
                          form.get('sanitaryVerdict')?.touched"
                   class="text-danger small">
                Verdict obligatoire
              </div>
            </div>

            <!-- Statut seulement en mode edit -->
            <div class="mb-3" *ngIf="isEdit">
              <label class="form-label fw-bold">Statut de résolution</label>
              <select formControlName="resolutionStatus" class="form-select">
                <option value="">-- Choisir --</option>
                <option *ngFor="let s of resolutionStatuses" [value]="s">
                  {{ s }}
                </option>
              </select>
            </div>

            <!-- Boutons -->
            <div class="d-flex gap-2 justify-content-end mt-4">
              <button type="button"
                      (click)="cancel()"
                      class="btn btn-outline-secondary">
                Annuler
              </button>
              <button type="submit"
                      [disabled]="form.invalid || loading"
                      class="btn btn-primary">
                <span *ngIf="loading"
                      class="spinner-border spinner-border-sm me-1">
                </span>
                {{ isEdit ? 'Modifier' : 'Créer' }}
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
