<div class="row mb-3">
  <div class="col-md-6"><h2><i class="bi bi-archive me-2"></i>Lots</h2></div>
  <div class="col-md-6 text-end">
    <a routerLink="../lots/nouveau" class="btn btn-success">
      <i class="bi bi-plus-circle me-1"></i>Nouveau lot
    </a>
  </div>
</div>

<div class="alert alert-success alert-dismissible" *ngIf="successMessage">
  <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
  <button type="button" class="btn-close" (click)="successMessage=''"></button>
</div>

<div class="row mb-3">
  <div class="col-md-4">
    <select class="form-select" [(ngModel)]="selectedStatut" (change)="filtrerParStatut()">
      <option value="">Tous les statuts</option>
      <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
    </select>
  </div>
  <div class="col-md-4">
    <select class="form-select" [(ngModel)]="selectedUrgence" (change)="filtrerParUrgence()">
      <option value="">Toutes les urgences</option>
      <option *ngFor="let u of urgences" [value]="u">{{ u }}</option>
    </select>
  </div>
  <div class="col-md-4">
    <button class="btn btn-outline-secondary w-100" (click)="reinitialiser()">
      <i class="bi bi-arrow-clockwise me-1"></i>Réinitialiser
    </button>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>ID</th><th>Donneur</th><th>Date</th><th>Statut</th>
            <th>Urgence</th><th>Produits</th><th>Matchs</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let lot of lots">
            <td>{{ lot.idLot }}</td>
            <td>Donneur #{{ lot.donneurId }}</td>
            <td>{{ lot.dateCreation | date:'dd/MM/yyyy HH:mm' }}</td>
            <td><span class="badge" [ngClass]="getStatutBadge(lot.statut)">{{ lot.statut }}</span></td>
            <td><span class="badge" [ngClass]="getUrgenceBadge(lot.niveauUrgence)">{{ lot.niveauUrgence }}</span></td>
            <td>{{ lot.nombreProduits }}</td>
            <td>{{ lot.nombreMatchs }}</td>
            <td>
              <a [routerLink]="['../lots', lot.idLot]" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-eye"></i></a>
              <a [routerLink]="['../lots/modifier', lot.idLot]" class="btn btn-sm btn-outline-warning me-1" *ngIf="lot.statut === 'PREDIT_DISPONIBLE'"><i class="bi bi-pencil"></i></a>
              <button class="btn btn-sm btn-outline-danger" (click)="supprimer(lot.idLot)" *ngIf="lot.statut === 'PREDIT_DISPONIBLE'"><i class="bi bi-trash"></i></button>
            </td>
          </tr>
          <tr *ngIf="lots.length === 0">
            <td colspan="8" class="text-center text-muted py-4">Aucun lot trouvé</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
