<div class="page-container">

  <!-- HEADER -->
  <div class="page-header">
    <div class="page-title">
      <div class="title-icon">
        <i class="bi" [ngClass]="isEditMode ? 'bi-pencil' : 'bi-plus-circle'"></i>
      </div>
      <div class="title-text">
        <h2>{{ isEditMode ? 'Modifier le lot' : 'Nouveau lot' }}</h2>
        <p>{{ isEditMode ? 'Modifiez les informations du lot' : 'Créez un nouveau lot de dons' }}</p>
      </div>
    </div>
    <div class="header-actions">
      <a routerLink="/donneur/lots" class="btn-back">
        <i class="bi bi-arrow-left"></i> Retour aux lots
      </a>
    </div>
  </div>

  <!-- FORM CARD -->
  <div class="form-wrapper">
    <div class="form-card">

      <!-- ERROR -->
      <div *ngIf="errorMessage" class="alert-error">
        <i class="bi bi-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" #f="ngForm">

        <!-- ID Donneur -->
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-person me-1"></i>
            ID du Donneur <span class="required">*</span>
          </label>
          <input
            type="number"
            class="form-input"
            [(ngModel)]="lot.donneurId"
            name="donneurId"
            required
            min="1"
            placeholder="Ex: 1"
          />
        </div>

        <!-- Niveau d'urgence -->
        <div class="form-group">
          <label class="form-label">
            <i class="bi bi-exclamation-triangle me-1"></i>
            Niveau d'urgence <span class="required">*</span>
          </label>
          <select
            class="form-input"
            [(ngModel)]="lot.niveauUrgence"
            name="niveauUrgence"
            required
          >
            <option value="" disabled>Choisir un niveau</option>
            <option *ngFor="let u of urgences" [value]="u">{{ u }}</option>
          </select>
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <a routerLink="/donneur/lots" class="btn-cancel">
            <i class="bi bi-x-lg"></i> Annuler
          </a>
          <button type="submit" class="btn-submit" [disabled]="!f.valid">
            <i class="bi" [ngClass]="isEditMode ? 'bi-check-lg' : 'bi-plus-circle'"></i>
            {{ isEditMode ? 'Modifier' : 'Créer le lot' }}
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
