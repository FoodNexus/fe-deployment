<div class="row" *ngIf="produit">
  <div class="col-md-8 mx-auto">
    <div class="card">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">
          <i class="bi bi-basket me-2"></i>Produit #{{ produit.idProduit }}
        </h4>
      </div>
      <div class="card-body">
        <table class="table">
          <tr><th class="w-25">ID</th><td>{{ produit.idProduit }}</td></tr>
          <tr><th>Code-barre</th><td><code>{{ produit.codeBarre }}</code></td></tr>
          <tr><th>Libellé</th><td>{{ produit.libelle }}</td></tr>
          <tr>
            <th>Catégorie</th>
            <td>
              <span class="badge" [ngClass]="getBadgeClass(produit.categorie)">
                {{ produit.categorie }}
              </span>
            </td>
          </tr>
          <tr><th>Poids unitaire</th><td>{{ produit.poidsUnitaire }} kg</td></tr>
        </table>
        <div class="d-flex gap-2">
          <a [routerLink]="['../../produits/modifier', produit.idProduit]"
             class="btn btn-warning">
            <i class="bi bi-pencil me-1"></i>Modifier
          </a>
          <a routerLink="../../produits" class="btn btn-secondary">
            <i class="bi bi-arrow-left me-1"></i>Retour
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
