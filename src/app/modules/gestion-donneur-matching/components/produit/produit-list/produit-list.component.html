<div class="row mb-3">
  <div class="col-md-6">
    <h2><i class="bi bi-basket me-2"></i>Produits</h2>
  </div>
  <div class="col-md-6 text-end">
    <a routerLink="/user/produits/nouveau" class="btn btn-success">
      <i class="bi bi-plus-circle me-1"></i>Ajouter un produit
    </a>
  </div>
</div>

<div class="alert alert-success alert-dismissible" *ngIf="successMessage">
  <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
  <button type="button" class="btn-close" (click)="successMessage=''"></button>
</div>

<!-- Filtres -->
<div class="row mb-3">
  <div class="col-md-5">
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="text" class="form-control" placeholder="Rechercher par libellé..."
             [(ngModel)]="searchKeyword" (keyup.enter)="rechercher()">
      <button class="btn btn-outline-primary" (click)="rechercher()">Rechercher</button>
    </div>
  </div>
  <div class="col-md-4">
    <select class="form-select" [(ngModel)]="selectedCategorie" (change)="filtrerParCategorie()">
      <option value="">Toutes les catégories</option>
      <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
    </select>
  </div>
  <div class="col-md-3">
    <button class="btn btn-outline-secondary w-100" (click)="reinitialiser()">
      <i class="bi bi-arrow-clockwise me-1"></i>Réinitialiser
    </button>
  </div>
</div>

<!-- Tableau -->
<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Code-barre</th>
            <th>Libellé</th>
            <th>Catégorie</th>
            <th>Poids (kg)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let produit of produits">
            <td>{{ produit.idProduit }}</td>
            <td><code>{{ produit.codeBarre }}</code></td>
            <td>{{ produit.libelle }}</td>
            <td>
              <span class="badge" [ngClass]="getBadgeClass(produit.categorie)">
                {{ produit.categorie }}
              </span>
            </td>
            <td>{{ produit.poidsUnitaire }}</td>
            <td>
              <a [routerLink]="['/user/produits', produit.idProduit]"
                 class="btn btn-sm btn-outline-primary me-1">
                <i class="bi bi-eye"></i>
              </a>
              <a [routerLink]="['/user/produits/modifier', produit.idProduit]"
                 class="btn btn-sm btn-outline-warning me-1">
                <i class="bi bi-pencil"></i>
              </a>
              <button class="btn btn-sm btn-outline-danger"
                      (click)="supprimer(produit.idProduit)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="produits.length === 0">
            <td colspan="6" class="text-center text-muted py-4">
              <i class="bi bi-inbox display-6 d-block mb-2"></i>
              Aucun produit trouvé
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
