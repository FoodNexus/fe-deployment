<div class="container-fluid p-4">

  <!-- Retour -->
  <div class="mb-3">
    <a routerLink="../" class="btn btn-outline-secondary btn-sm">← Retour au centre IA</a>
  </div>

  <div class="row">
    <!-- Formulaire -->
    <div class="col-lg-6 mb-4">
      <div class="card shadow-sm border-warning">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0">🔍 Contrôle Qualité (Computer Vision)</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-bold">Photo du produit à vérifier</label>
            <input type="file" class="form-control" accept="image/*" (change)="onFileSelected($event)">
          </div>

          <div *ngIf="imagePreview" class="mb-3 text-center">
            <img [src]="imagePreview" class="img-fluid rounded border" style="max-height: 250px;" alt="Aperçu">
          </div>

          <button class="btn btn-warning w-100" [disabled]="!selectedFile || loading" (click)="verifier()">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            <span *ngIf="!loading">🔍 Vérifier la qualité</span>
            <span *ngIf="loading">Analyse en cours...</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Résultat -->
    <div class="col-lg-6 mb-4">
      <div class="card shadow-sm" *ngIf="result" [ngClass]="{
        'border-success': result.niveau === 'BONNE',
        'border-warning': result.niveau === 'MOYENNE',
        'border-danger': result.niveau === 'MAUVAISE'
      }">
        <div class="card-header text-white" [ngClass]="{
          'bg-success': result.niveau === 'BONNE',
          'bg-warning text-dark': result.niveau === 'MOYENNE',
          'bg-danger': result.niveau === 'MAUVAISE'
        }">
          <h5 class="mb-0">
            <span *ngIf="result.niveau === 'BONNE'">✅ Qualité BONNE</span>
            <span *ngIf="result.niveau === 'MOYENNE'">⚠️ Qualité MOYENNE</span>
            <span *ngIf="result.niveau === 'MAUVAISE'">❌ Qualité MAUVAISE</span>
          </h5>
        </div>
        <div class="card-body">
          <!-- Barre de score -->
          <div class="mb-3">
            <label class="form-label fw-bold">Score de qualité</label>
            <div class="progress" style="height: 30px;">
              <div class="progress-bar" role="progressbar"
                [style.width.%]="result.score * 100"
                [ngClass]="{
                  'bg-success': result.score >= 0.8,
                  'bg-warning': result.score >= 0.5 && result.score < 0.8,
                  'bg-danger': result.score < 0.5
                }">
                {{ (result.score * 100).toFixed(0) }}%
              </div>
            </div>
          </div>

          <table class="table table-bordered">
            <tbody>
              <tr>
                <th class="bg-light" style="width: 40%;">Niveau</th>
                <td>
                  <span class="badge fs-6" [ngClass]="{
                    'bg-success': result.niveau === 'BONNE',
                    'bg-warning text-dark': result.niveau === 'MOYENNE',
                    'bg-danger': result.niveau === 'MAUVAISE'
                  }">{{ result.niveau }}</span>
                </td>
              </tr>
              <tr>
                <th class="bg-light">Recommandation</th>
                <td>{{ result.recommandation }}</td>
              </tr>
              <tr>
                <th class="bg-light">Décision</th>
                <td>
                  <span *ngIf="result.niveau !== 'MAUVAISE'" class="text-success fw-bold">→ Vers MATCHING</span>
                  <span *ngIf="result.niveau === 'MAUVAISE'" class="text-danger fw-bold">→ Vers RECYCLAGE</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error">
        <strong>Erreur :</strong> {{ error }}
      </div>
    </div>
  </div>
</div>
