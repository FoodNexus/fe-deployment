<div class="row mb-3">
  <div class="col-md-6"><h2><i class="bi bi-link-45deg me-2"></i>Matchs</h2></div>
  <div class="col-md-6 text-end">
    <a routerLink="../matching/lancer" class="btn btn-danger">
      <i class="bi bi-cpu me-1"></i>Lancer un matching
    </a>
  </div>
</div>

<div class="alert alert-success alert-dismissible" *ngIf="successMessage">
  {{ successMessage }}
  <button type="button" class="btn-close" (click)="successMessage=''"></button>
</div>

<div class="row mb-3">
  <div class="col-md-4">
    <select class="form-select" [(ngModel)]="selectedStatut" (change)="filtrerParStatut()">
      <option value="">Tous les statuts</option>
      <option *ngFor="let s of statuts" [value]="s">{{ s }}</option>
    </select>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr><th>ID</th><th>Lot</th><th>Receveur</th><th>Quantité</th><th>Score</th><th>Date</th><th>Statut</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let m of matchs">
            <td>{{ m.idMatch }}</td>
            <td><a [routerLink]="['../lots', m.lotId]">Lot #{{ m.lotId }}</a></td>
            <td>Receveur #{{ m.idReceveur }}</td>
            <td>{{ m.quantiteAllouee }}</td>
            <td><span class="badge bg-primary">{{ m.scoreMatching }}</span></td>
            <td>{{ m.dateMatch | date:'dd/MM/yyyy HH:mm' }}</td>
            <td><span class="badge" [ngClass]="getStatutBadge(m.statutMatch)">{{ m.statutMatch }}</span></td>
            <td>
              <div class="btn-group btn-group-sm">
                <a [routerLink]="['../matchs', m.idMatch]" class="btn btn-outline-primary"><i class="bi bi-eye"></i></a>
                <button class="btn btn-outline-success" (click)="changerStatut(m.idMatch, 'CONFIRME')" *ngIf="m.statutMatch === 'EN_ATTENTE_LOGISTIQUE'" title="Confirmer"><i class="bi bi-check-lg"></i></button>
                <button class="btn btn-outline-info" (click)="changerStatut(m.idMatch, 'LIVRE')" *ngIf="m.statutMatch === 'CONFIRME'" title="Livré"><i class="bi bi-truck"></i></button>
                <button class="btn btn-outline-danger" (click)="changerStatut(m.idMatch, 'REFUSE')" *ngIf="m.statutMatch === 'EN_ATTENTE_LOGISTIQUE'" title="Refuser"><i class="bi bi-x-lg"></i></button>
              </div>
            </td>
          </tr>
          <tr *ngIf="matchs.length === 0">
            <td colspan="8" class="text-center text-muted py-4">Aucun match</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
